name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: luca_user
          POSTGRES_PASSWORD: luca_test_pw
          POSTGRES_DB: luca_passport
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U luca_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://luca_user:luca_test_pw@localhost:5432/luca_passport
      JWT_SECRET: ci-test-secret
      NODE_ENV: test
      LUCA_AI_MODE: mock

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci || npm install

      - name: Initialize database schema
        run: psql "$DATABASE_URL" -f backend/schema.sql || echo "schema.sql apply skipped"

      - name: Lint backend
        working-directory: backend
        run: npm run lint --if-present

      - name: Run backend tests with coverage
        working-directory: backend
        run: npm run test:coverage

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          if-no-files-found: ignore

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci || npm install

      - name: Lint frontend
        run: npm run lint --if-present

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: https://solaris-health.abacusai.cloud/api
