version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: luca_user
      POSTGRES_PASSWORD: 76366c9da29dd1dcdc1e91b0c03464ee82751f0c1cd9d944
      POSTGRES_DB: luca_passport
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./backend/schema_solaris.sql:/docker-entrypoint-initdb.d/2-schema_solaris.sql
      - ./backend/schema_wallet.sql:/docker-entrypoint-initdb.d/3-schema_wallet.sql
      - ./backend/schema_messaging.sql:/docker-entrypoint-initdb.d/4-schema_messaging.sql
      - ./backend/schema_marketplace.sql:/docker-entrypoint-initdb.d/5-schema_marketplace.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luca_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://luca_user:${DB_PASSWORD:-76366c9da29dd1dcdc1e91b0c03464ee82751f0c1cd9d944}@postgres:5432/luca_passport
      JWT_SECRET: ${JWT_SECRET:-2f4e1b87f1cc5bf971470dd66e42b6a6356828491a3336fe3d7ef1422088cc9a76329516f40e44c60a9869b94e9cd4ff65cc96975fcaa1a654cd5427003778ab}
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args: {}
    environment: {}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # Seed data (runs once)
  seed:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql://luca_user:${DB_PASSWORD:-76366c9da29dd1dcdc1e91b0c03464ee82751f0c1cd9d944}@postgres:5432/luca_passport
    command: node seed_solaris.js
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
    driver: local

networks:
  default:
    name: solaris-network
