version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: luca_user
      POSTGRES_PASSWORD: luca_dev_2026
      POSTGRES_DB: luca_passport
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./backend/schema_solaris.sql:/docker-entrypoint-initdb.d/2-schema_solaris.sql
      - ./backend/schema_wallet.sql:/docker-entrypoint-initdb.d/3-schema_wallet.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luca_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql://luca_user:${DB_PASSWORD:-luca_prod_2026}@postgres:5432/luca_passport
      JWT_SECRET: ${JWT_SECRET:-luca_prod_secret_2026_change_in_production}
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${API_URL:-http://localhost:5000}/api
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:5000}/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # Seed data (runs once)
  seed:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql://luca_user:${DB_PASSWORD:-luca_prod_2026}@postgres:5432/luca_passport
    command: node seed_solaris.js
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
    driver: local

networks:
  default:
    name: solaris-network
