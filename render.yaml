# Render blueprint for Solaris Health.
# The backend runs migrations on boot (also invoked here for clarity), the
# frontend is a static Vite build served from ./dist, and a managed Postgres
# is provisioned and wired into the backend via DATABASE_URL.
services:
  - type: web
    name: solaris-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run migrate && node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: solaris-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: LUCA_AI_MODE
        value: cloud
      - key: LUCA_AI_BASE_URL
        sync: false
      - key: LUCA_AI_API_KEY
        sync: false
      - key: LUCA_AI_MODEL
        value: claude-sonnet-4-6
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: solaris-frontend
    env: static
    # Frontend source lives at the repo root (src/, public/, package.json).
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: solaris-db
    plan: free
