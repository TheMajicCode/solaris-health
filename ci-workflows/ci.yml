name: Solaris CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Backend smoke tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: solaris_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: solaris_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://solaris_test:test_password@localhost:5432/solaris_test
      JWT_SECRET: ci_test_secret_not_used_in_production_64chars_padding_here_ok
      LUCA_AI_MODE: mock
      NODE_ENV: test
      PORT: 5000
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Apply schema (base tables)
        run: |
          cd backend
          # Apply all schema files in order
          for f in $(ls src/db/schema*.sql 2>/dev/null | sort); do
            echo "Applying $f..."
            psql "$DATABASE_URL" -f "$f" 2>&1 || true
          done
          # Apply numbered migrations
          for f in $(ls migrations/*.sql 2>/dev/null | sort); do
            echo "Applying migration $f..."
            psql "$DATABASE_URL" -f "$f" 2>&1 || true
          done
        env:
          PGPASSWORD: test_password

      - name: Start backend
        run: |
          cd backend
          node src/server.js &
          sleep 4
          curl -sf http://localhost:5000/api/health || (echo 'Backend did not start' && exit 1)

      - name: Seed test data
        run: |
          cd backend
          node scripts/seed-demo-data.js 2>/dev/null || node src/db/seed-demo-data.js 2>/dev/null || echo 'Seed skipped'

      - name: Run smoke tests
        run: cd backend && node scripts/smoke-test.js

  lint:
    name: Lint frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx eslint src/ --ext .js,.jsx --max-warnings 50 2>/dev/null || echo 'ESLint not configured — skipping'

  build:
    name: Frontend build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: https://solaris-health.abacusai.cloud
